name: release-mcpb

# Build the social-autoposter .mcpb and CLOBBER-UPLOAD it onto an EXISTING
# GitHub Release. CI is an asset re-builder ONLY; it never creates releases
# and never publishes npm:
#   - it has no npm auth, so half-running the release script here leaves the
#     npm and GitHub lanes diverged (the rc.6 incident, 2026-07-03);
#   - creating a release here for an rc tag would (before the script's create
#     guard) have cut it STABLE, moving releases/latest onto a prerelease for
#     the whole fleet.
# The ONLY way to cut a release is locally:
#   bash scripts/release-mcpb.sh            # stable
#   bash scripts/release-mcpb.sh --staging  # rc pre-release (staging channel)
#   bash scripts/release-mcpb.sh --promote vX.Y.Z-rc.N
#
# Trigger: push a tag like v1.6.56 (after the local release created it), or
# run manually from the Actions tab.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (e.g. v1.6.56). Defaults to the pushed tag."
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag + guard (CI never CREATES releases)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          if ! gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::No GitHub release exists for $TAG. CI only clobber-uploads the .mcpb onto an EXISTING release (no npm auth here, and creating one from CI risks cutting an rc as stable). Cut the release locally: bash scripts/release-mcpb.sh [--staging]."
            exit 1
          fi
          echo "release $TAG exists; proceeding with asset build + clobber upload"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install mcpb CLI
        run: npm i -g @anthropic-ai/mcpb

      - name: Install MCP deps
        working-directory: mcp
        run: npm ci || npm install

      - name: Build, pack, verify, upload asset (no npm, no release creation)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/release-mcpb.sh --tag "$TAG" --no-npm
