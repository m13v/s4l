name: secret-scan

# Server-side safety net for a PUBLIC repo. Runs on every push and PR, so it
# catches leaks even when a local pre-commit hook is bypassed with --no-verify
# or a commit lands via the background auto-commit agent.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  repo-hygiene:
    name: repo-hygiene (images / home-paths / secret shapes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scan tracked tree
        run: python3 scripts/scan_pii.py --all
